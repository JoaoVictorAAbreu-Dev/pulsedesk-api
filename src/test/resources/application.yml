spring:
  datasource:
    url: jdbc:h2:mem:pulsedesk;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
app:
  security:
    jwt:
      secret: pulsedesk-test-secret-key-pulsedesk-test-secret-key
      expiration-minutes: 120
